<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess the Missing Shot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .header p { color: #cbd5e1; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 20px;
        }
        .card-title { color: #94a3b8; font-size: 0.9em; margin-bottom: 15px; display: block; }
        .card h3 { color: white; margin-bottom: 20px; font-size: 1.2em; }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            color: white;
        }
        input::placeholder { color: #64748b; }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary { background: #10b981; color: white; }
        .btn-primary:hover { background: #059669; }
        .btn-secondary { background: #3b82f6; color: white; }
        .btn-secondary:hover { background: #2563eb; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { background: #dc2626; }
        .btn-warning { background: #a855f7; color: white; }
        .btn-warning:hover { background: #9333ea; }
        .scoreboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
        .score-box { background: #0f172a; padding: 20px; border-radius: 8px; text-align: center; }
        .score-label { color: #94a3b8; font-size: 0.85em; margin-bottom: 8px; }
        .score-value { color: white; font-size: 2.5em; font-weight: bold; }
        .team-display {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .team-display.court { border-color: #10b981; }
        .team-display.observing { border-color: #3b82f6; }
        .team-label { font-size: 0.85em; color: #94a3b8; margin-bottom: 8px; }
        .team-name { color: white; font-weight: 600; margin-bottom: 10px; }
        .players { font-size: 0.9em; color: #cbd5e1; }
        .players p { margin: 4px 0; }
        .shot-display {
            background: #0f172a;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            margin: 20px 0;
        }
        .shot-label { color: #94a3b8; font-size: 0.9em; margin-bottom: 15px; }
        .shot-name { color: white; font-size: 2.5em; font-weight: bold; margin: 20px 0; }
        .rally-dots { display: flex; justify-content: center; gap: 8px; margin: 20px 0; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #334155; }
        .dot.active { background: #10b981; }
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 1px solid #334155; }
        .tab-button {
            padding: 12px 20px;
            border: none;
            background: none;
            color: #94a3b8;
            font-size: 1em;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        .tab-button.active { color: white; border-bottom-color: #10b981; }
        .hidden { display: none; }
        .rules-grid { display: grid; gap: 15px; }
        .rule { background: #1e293b; border: 1px solid #334155; padding: 15px; border-radius: 8px; }
        .rule h4 { color: white; margin-bottom: 8px; }
        .rule p { color: #cbd5e1; font-size: 0.9em; line-height: 1.5; }
        .score-btn { border: none; border-radius: 4px; color: white; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .score-btn:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        const SHOTS = ['Net', 'Cross Net', 'Lift', 'Cross Lift', 'Smash', 'Cross Smash', 'Slice', 'Cross Slice', 'Clear', 'Cross Clear', 'Drop', 'Cross Drop'];
        const RULES = [
            { title: '1. Teams Setup', text: '3 teams of 4 people. Use Random Court Teams to pick which 2 teams start.' },
            { title: '2. Pairs & Positions', text: 'Each team has 2 pairs (players 1-2 and 3-4). 1 pair plays on court, the other observes. The off-court team watches from the side.' },
            { title: '3. Random Shot Generator', text: 'A random shot is generated each round. Playing teams cannot play this shot.' },
            { title: '4. Scoring to 8 Points', text: 'Play to 8 points. Swap pairs every 4 points.' },
            { title: '5. Observing Team Guesses', text: 'After 8 points, the off-court team can guess the shot. Can also guess anytime if confident.' },
            { title: '6. Playing Team Guesses', text: 'Playing teams can guess opponent\'s shot anytime. Correct guess = +5 points, team goes on court. Wrong guess = -3 points.' },
            { title: '7. Round Transitions', text: 'After both teams guess (or 8 points reached), use generator to pick new observer team. All teams get new shots.' }
        ];

        function createTeams(numTeams, numPlayers) {
            const teams = [];
            for (let i = 0; i < numTeams; i++) {
                teams.push({
                    id: i + 1,
                    name: `Team ${i + 1}`,
                    players: Array(numPlayers).fill(''),
                    score: 0
                });
            }
            return teams;
        }

        let gameState = {
            gameStarted: true,
            numTeams: 3,
            numPlayersPerTeam: 4,
            teams: createTeams(3, 4),
            courtTeams: [0, 1],
            observingTeam: 2,
            gamePoints: 0,
            playingPairIndex: [0, 0],
            currentShot: -1,
            guessResult: null,
            lastShot: -1,
            enabledShots: [true, true, true, true, true, true, true, true, true, true, true, true],
            teamShots: [-1, -1, -1]
        };

        function render() {
            const app = document.getElementById('app');
            const court1 = gameState.teams[gameState.courtTeams[0]];
            const court2 = gameState.teams[gameState.courtTeams[1]];
            const observing = gameState.teams[gameState.observingTeam];

            app.innerHTML = `
                    <div class="container">
                        <div class="header">
                            <h1>Guess the Missing Shot</h1>
                            <img src="header-image.png" style="max-width: 100%; height: auto; border-radius: 8px; margin-top: 20px; max-height: 300px;">
                        </div>
                        <div class="card" style="margin-bottom: 30px;">
                            <h3>Team Setup</h3>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                                <div>
                                    <label style="color: #94a3b8; font-size: 0.9em; display: block; margin-bottom: 8px;">Number of Teams</label>
                                    <input type="number" min="2" max="10" value="${gameState.numTeams}" onchange="updateTeamConfig(parseInt(this.value), gameState.numPlayersPerTeam)" style="width: 100%; padding: 10px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: white;">
                                </div>
                                <div>
                                    <label style="color: #94a3b8; font-size: 0.9em; display: block; margin-bottom: 8px;">Players per Team</label>
                                    <input type="number" min="1" max="10" value="${gameState.numPlayersPerTeam}" onchange="updateTeamConfig(gameState.numTeams, parseInt(this.value))" style="width: 100%; padding: 10px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: white;">
                                </div>
                            </div>
                            <div class="grid">
                                ${gameState.teams.map((team, idx) => `
                                    <div style="background: #0f172a; padding: 15px; border-radius: 8px;">
                                        <input type="text" placeholder="Team Name" value="${team.name}" onchange="updateTeamName(${idx}, this.value)" style="margin-bottom: 10px;">
                                        ${team.players.map((p, pIdx) => `
                                            <input type="text" placeholder="Player ${pIdx + 1}" value="${p}" onchange="updatePlayer(${team.id}, ${pIdx}, this.value)" style="margin-bottom: 5px;">
                                        `).join('')}
                                    </div>
                                `).join('')}
                            </div>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
                                <button class="btn-warning" onclick="randomizeCourtTeams()">Random Court Teams</button>
                                <button class="btn-secondary" onclick="resetTeams()">Clear All</button>
                            </div>
                        </div>
                        <div class="tabs">
                            <button class="tab-button active" onclick="switchTab('game')">Game</button>
                            <button class="tab-button" onclick="switchTab('shots')">Shots</button>
                            <button class="tab-button" onclick="switchTab('rules')">Rules</button>
                        </div>
                        <div id="game-tab">
                            <div class="scoreboard">
                                ${gameState.teams.map((t, idx) => `
                                    <div class="score-box">
                                        <div class="score-label">${t.name}</div>
                                        <div class="score-value">${t.score}</div>
                                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px;">
                                            <button class="score-btn" onclick="adjustScore(${idx}, -1)" style="background: #ef4444; padding: 6px; font-size: 0.9em;">-1</button>
                                            <button class="score-btn" onclick="adjustScore(${idx}, 1)" style="background: #10b981; padding: 6px; font-size: 0.9em;">+1</button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="card" style="margin-bottom: 20px; text-align: center;">
                                <div style="color: #94a3b8; font-size: 0.9em; margin-bottom: 8px;">Points This Rally</div>
                                <div style="color: white; font-size: 2.5em; font-weight: bold;">${gameState.gamePoints}/8</div>
                                ${gameState.gamePoints === 4 ? `<div style="color: #a855f7; margin-top: 10px;">Swap Pairs!</div>` : ''}
                            </div>
                            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px;">
                                <div class="team-display court">
                                    <div class="team-label">On Court - ${court1.name}</div>
                                    <div style="color: #10b981; font-weight: 600; margin-bottom: 10px;">Pair ${gameState.playingPairIndex[0] + 1}</div>
                                    <div class="players">
                                        ${court1.players.slice(gameState.playingPairIndex[0] * 2, gameState.playingPairIndex[0] * 2 + 2).map(p => `<p style="color: #10b981;">• ${p}</p>`).join('')}
                                    </div>
                                    ${gameState.teamShots[gameState.courtTeams[0]] >= 0 ? `<div style="color: #ef4444; margin-top: 10px; font-size: 0.9em;"><strong>Can't play:</strong> ${SHOTS[gameState.teamShots[gameState.courtTeams[0]]]}</div>` : ''}
                                </div>
                                <div class="team-display court">
                                    <div class="team-label">On Court - ${court2.name}</div>
                                    <div style="color: #10b981; font-weight: 600; margin-bottom: 10px;">Pair ${gameState.playingPairIndex[1] + 1}</div>
                                    <div class="players">
                                        ${court2.players.slice(gameState.playingPairIndex[1] * 2, gameState.playingPairIndex[1] * 2 + 2).map(p => `<p style="color: #10b981;">• ${p}</p>`).join('')}
                                    </div>
                                    ${gameState.teamShots[gameState.courtTeams[1]] >= 0 ? `<div style="color: #ef4444; margin-top: 10px; font-size: 0.9em;"><strong>Can't play:</strong> ${SHOTS[gameState.teamShots[gameState.courtTeams[1]]]}</div>` : ''}
                                </div>
                                ${gameState.teams.map((team, idx) => {
                                    if (idx !== gameState.courtTeams[0] && idx !== gameState.courtTeams[1]) {
                                        return `
                                            <div class="team-display observing">
                                                <div class="team-label">Off Court - ${team.name}</div>
                                                <div class="players">
                                                    ${team.players.map(p => `<p>• ${p}</p>`).join('')}
                                                </div>
                                                ${gameState.teamShots[idx] >= 0 ? `<div style="color: #3b82f6; margin-top: 10px; font-size: 0.9em;"><strong>Guess:</strong> ${SHOTS[gameState.teamShots[idx]]}</div>` : ''}
                                            </div>
                                        `;
                                    }
                                    return '';
                                }).join('')}
                            </div>
                            <div class="card" style="margin-top: 30px;">
                                <h3>Generate Shot Cards</h3>
                                <p style="color: #94a3b8; margin-bottom: 15px;">Give each team their shot they can't play</p>
                                <button class="btn-secondary" onclick="generateTeamShots()">Generate Shots</button>
                                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
                                    <button class="btn-primary" onclick="swapPairs()" ${gameState.gamePoints < 4 ? 'disabled style="opacity: 0.5;"' : ''}>Swap Pairs (at 4pts)</button>
                                    <button class="btn-warning" onclick="nextRound()" ${gameState.gamePoints < 8 ? 'disabled style="opacity: 0.5;"' : ''}>Next Round (at 8pts)</button>
                                </div>
                            </div>
                            <div class="card" style="margin-top: 20px;">
                                <h3>Playing Teams Guessing</h3>
                                <p style="color: #94a3b8; margin-bottom: 15px;">Guess opponent's shot: +5 pts & observer goes on court. Wrong: -3 pts</p>
                                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                                    ${gameState.teamShots[gameState.courtTeams[0]] >= 0 ? `
                                        <button class="btn-primary" onclick="courtGuessCorrect(${gameState.courtTeams[0]})" style="background: #059669;">Team ${gameState.courtTeams[0] + 1} Correct</button>
                                        <button class="btn-danger" onclick="courtGuessIncorrect(${gameState.courtTeams[0]})">Team ${gameState.courtTeams[0] + 1} Wrong</button>
                                    ` : ''}
                                    ${gameState.teamShots[gameState.courtTeams[1]] >= 0 ? `
                                        <button class="btn-primary" onclick="courtGuessCorrect(${gameState.courtTeams[1]})" style="background: #059669;">Team ${gameState.courtTeams[1] + 1} Correct</button>
                                        <button class="btn-danger" onclick="courtGuessIncorrect(${gameState.courtTeams[1]})">Team ${gameState.courtTeams[1] + 1} Wrong</button>
                                    ` : ''}
                                </div>
                            </div>
                            <div class="card" style="margin-top: 20px;">
                                <h3>Off-Court Team Guessing</h3>
                                <p style="color: #3b82f6; margin-bottom: 15px;">Guess anytime: +5 pts & go on court. Wrong: -3 pts</p>
                                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                                    <button class="btn-primary" onclick="observerGuessCorrect()" style="background: #3b82f6;">Observer Correct</button>
                                    <button class="btn-danger" onclick="observerGuessIncorrect()">Observer Wrong</button>
                                </div>
                            </div>
                        </div>
                        <div id="shots-tab" class="hidden">
                            <div class="rules-grid">
                                <h3>Available Shots</h3>
                                <p style="color: #cbd5e1; margin-bottom: 20px;">Toggle shots on/off to customize gameplay</p>
                                <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px;">
                                    ${SHOTS.map((shot, idx) => `
                                        <div style="background: #1e293b; padding: 15px; border-radius: 8px; display: flex; align-items: center; gap: 10px;">
                                            <input type="checkbox" id="shot-${idx}" ${gameState.enabledShots[idx] ? 'checked' : ''} onchange="toggleShot(${idx})" style="width: 20px; height: 20px; cursor: pointer;">
                                            <label for="shot-${idx}" style="color: white; cursor: pointer; flex: 1;">${shot}</label>
                                        </div>
                                    `).join('')}
                                </div>
                                <div style="margin-top: 20px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;">
                                    <button class="btn-secondary" onclick="enableAllShots()">Enable All</button>
                                    <button class="btn-danger" onclick="disableAllShots()">Disable All</button>
                                    <button class="btn-primary" onclick="setSimpleMode()" style="background: #3b82f6;">Simple Mode</button>
                                    <button class="btn-primary" onclick="setAdvancedMode()" style="background: #10b981;">Advanced Mode</button>
                                </div>
                            </div>
                        </div>
                        <div id="rules-tab" class="hidden">
                            <div class="rules-grid">
                                ${RULES.map(rule => `
                                    <div class="rule">
                                        <h4>${rule.title}</h4>
                                        <p>${rule.text}</p>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
        }

        function updatePlayer(teamId, playerIdx, value) {
            const team = gameState.teams.find(t => t.id === teamId);
            if (team) team.players[playerIdx] = value;
            render();
        }

        function updateTeamName(teamIdx, value) {
            gameState.teams[teamIdx].name = value;
            render();
        }

        function updateTeamConfig(numTeams, numPlayers) {
            gameState.numTeams = numTeams;
            gameState.numPlayersPerTeam = numPlayers;
            gameState.teams = createTeams(numTeams, numPlayers);
            gameState.courtTeams = [0, 1];
            gameState.observingTeam = Math.min(2, numTeams - 1);
            gameState.rallies = 0;
            gameState.currentShot = -1;
            gameState.guessResult = null;
            render();
        }

        function resetTeams() {
            gameState.teams.forEach(team => {
                team.players = Array(gameState.numPlayersPerTeam).fill('');
                team.score = 0;
            });
            gameState.rallies = 0;
            gameState.currentShot = -1;
            gameState.guessResult = null;
            render();
        }

        function randomizeCourtTeams() {
            const teamIndices = Array.from({length: gameState.numTeams}, (_, i) => i);
            const shuffled = [...teamIndices].sort(() => Math.random() - 0.5);
            gameState.courtTeams = shuffled.slice(0, 2);
            gameState.observingTeam = shuffled[2] !== undefined ? shuffled[2] : 0;
            gameState.gamePoints = 0;
            gameState.playingPairIndex = [0, 0];
            gameState.currentShot = -1;
            gameState.teamShots = [-1, -1, -1];
            gameState.guessResult = null;
            render();
        }

        function generateTeamShots() {
            const enabledIndices = gameState.enabledShots.map((enabled, idx) => enabled ? idx : -1).filter(idx => idx !== -1);
            if (enabledIndices.length === 0) {
                alert('Enable at least one shot type');
                return;
            }
            gameState.teamShots = gameState.teams.map(() => {
                let shot = enabledIndices[Math.floor(Math.random() * enabledIndices.length)];
                while (shot === gameState.lastShot && enabledIndices.length > 1) {
                    shot = enabledIndices[Math.floor(Math.random() * enabledIndices.length)];
                }
                return shot;
            });
            gameState.lastShot = gameState.teamShots[0];
            render();
        }

        function swapPairs() {
            gameState.playingPairIndex[0] = gameState.playingPairIndex[0] === 0 ? 1 : 0;
            gameState.playingPairIndex[1] = gameState.playingPairIndex[1] === 0 ? 1 : 0;
            render();
        }

        function courtGuessCorrect(teamIdx) {
            gameState.teams[teamIdx].score += 5;
            gameState.gamePoints = 0;
            const newCourt = [gameState.observingTeam, gameState.courtTeams[0]];
            gameState.observingTeam = gameState.courtTeams[1];
            gameState.courtTeams = newCourt;
            gameState.playingPairIndex = [0, 0];
            gameState.teamShots = [-1, -1, -1];
            render();
        }

        function courtGuessIncorrect(teamIdx) {
            gameState.teams[teamIdx].score = Math.max(0, gameState.teams[teamIdx].score - 3);
            render();
        }

        function nextRound() {
            const teamIndices = Array.from({length: gameState.numTeams}, (_, i) => i);
            const shuffled = [...teamIndices].sort(() => Math.random() - 0.5);
            gameState.courtTeams = shuffled.slice(0, 2);
            gameState.observingTeam = shuffled[2] !== undefined ? shuffled[2] : 0;
            gameState.gamePoints = 0;
            gameState.playingPairIndex = [0, 0];
            gameState.teamShots = [-1, -1, -1];
            render();
        }

        function observerGuessCorrect() {
            gameState.teams[gameState.observingTeam].score += 5;
            gameState.gamePoints = 0;
            const newCourt = [gameState.observingTeam, gameState.courtTeams[0]];
            gameState.observingTeam = gameState.courtTeams[1];
            gameState.courtTeams = newCourt;
            gameState.playingPairIndex = [0, 0];
            gameState.teamShots = [-1, -1, -1];
            render();
        }

        function observerGuessIncorrect() {
            gameState.teams[gameState.observingTeam].score = Math.max(0, gameState.teams[gameState.observingTeam].score - 3);
            render();
        }

        function startGame() {
            render();
        }

        function spinRacket() {
            const newCourt = [gameState.observingTeam, gameState.courtTeams[0]];
            gameState.observingTeam = gameState.courtTeams[1];
            gameState.courtTeams = newCourt;
            gameState.rallies = 0;
            gameState.currentShot = -1;
            gameState.guessResult = null;
            render();
        }

        function generateShot() {
            const enabledIndices = gameState.enabledShots.map((enabled, idx) => enabled ? idx : -1).filter(idx => idx !== -1);
            if (enabledIndices.length === 0) {
                alert('Enable at least one shot type');
                return;
            }
            let newShot = enabledIndices[Math.floor(Math.random() * enabledIndices.length)];
            while (newShot === gameState.lastShot && enabledIndices.length > 1) {
                newShot = enabledIndices[Math.floor(Math.random() * enabledIndices.length)];
            }
            gameState.currentShot = newShot;
            gameState.lastShot = newShot;
            gameState.guessResult = null;
            render();
        }

        function recordGuess(correct) {
            gameState.guessResult = correct ? 'correct' : 'incorrect';
            gameState.rallies++;
            render();
            if (gameState.rallies >= 3) {
                setTimeout(() => spinRacket(), 1500);
            }
        }

        function adjustScore(teamIdx, amount) {
            gameState.teams[teamIdx].score = Math.max(0, gameState.teams[teamIdx].score + amount);
            render();
        }

        function recordGuess(correct) {
            gameState.guessResult = correct ? 'correct' : 'incorrect';
            gameState.rallies++;
            render();
            if (gameState.rallies >= 3) {
                setTimeout(() => spinRacket(), 1500);
            }
        }

        function switchTab(tab) {
            document.getElementById('game-tab').classList.toggle('hidden', tab !== 'game');
            document.getElementById('shots-tab').classList.toggle('hidden', tab !== 'shots');
            document.getElementById('rules-tab').classList.toggle('hidden', tab !== 'rules');
            document.querySelectorAll('.tab-button').forEach((btn, idx) => {
                btn.classList.toggle('active', (idx === 0 && tab === 'game') || (idx === 1 && tab === 'shots') || (idx === 2 && tab === 'rules'));
            });
        }

        function toggleShot(idx) {
            gameState.enabledShots[idx] = !gameState.enabledShots[idx];
            render();
        }

        function enableAllShots() {
            gameState.enabledShots = gameState.enabledShots.map(() => true);
            render();
        }

        function disableAllShots() {
            gameState.enabledShots = gameState.enabledShots.map(() => false);
            render();
        }

        function setSimpleMode() {
            gameState.enabledShots = [true, false, true, false, true, false, true, false, true, false, true, false];
            render();
        }

        function setAdvancedMode() {
